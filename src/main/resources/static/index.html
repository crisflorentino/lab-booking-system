<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Booking System</title>
    <style>
        /* Sleek, modern resets */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f8;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* The Main Card */
        .container {
            background: #ffffff;
            width: 100%;
            max-width: 900px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        h1, h2, h3 { font-weight: 600; margin-bottom: 15px; color: #111; }
        p { color: #666; margin-bottom: 20px; line-height: 1.5; }
        .hidden { display: none !important; }

        /* Buttons */
        button {
            background-color: #111;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }
        button:hover { background-color: #333; }
        button.danger { background-color: #fff; color: #dc3545; border: 1px solid #dc3545; }
        button.danger:hover { background-color: #dc3545; color: #fff; }
        button.small { padding: 8px 12px; font-size: 13px; margin-top: 10px; }

        /* Form Inputs */
        input[type="datetime-local"] {
            width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px;
            border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: inherit;
        }
        input:focus { border-color: #111; }

        /* --- LOGIN SECTION STYLING --- */
        #loginSection { max-width: 360px; margin: 0 auto; text-align: center; }
        #loginSection h1 { font-size: 24px; margin-bottom: 10px; }

        /* The custom "N" Input Box */
        .input-group {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }
        .input-group:focus-within { border-color: #111; }
        .input-group .prefix {
            background: #f9fafb;
            padding: 12px 16px;
            color: #555;
            font-weight: 600;
            border-right: 1px solid #ddd;
        }
        .input-group input {
            border: none;
            padding: 12px;
            flex: 1;
            outline: none;
            font-size: 16px;
        }

        /* --- DASHBOARD STYLING --- */
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .header-row button { width: auto; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } } /* Mobile responsive */

        .panel { background: #f9fafb; padding: 20px; border-radius: 12px; border: 1px solid #eaeaea; }

        .card {
            background: #ffffff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
            margin-bottom: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .status-badge { font-size: 12px; padding: 3px 8px; border-radius: 12px; background: #e0f2fe; color: #0284c7; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">

    <div id="loginSection">
        <h1>Welcome Back</h1>
        <p>Enter your student ID to access the lab.</p>

        <div class="input-group">
            <span class="prefix">N</span>
            <input type="text" id="userIdInput" placeholder="987654321" autocomplete="off">
        </div>
        <button onclick="login()">Access Dashboard</button>
    </div>

    <div id="dashboardSection" class="hidden">

        <div class="header-row">
            <div>
                <h1>University Lab System</h1>
                <p style="margin:0;">Student ID: <strong>N<span id="displayUserId"></span></strong></p>
            </div>
            <button class="danger" onclick="logout()">Logout</button>
        </div>

        <div class="dashboard-grid">

            <div class="panel">
                <h3>Reserve Equipment</h3>

                <div style="margin-bottom: 20px;">
                    <label style="font-size: 14px; font-weight: 500;">Start Time</label>
                    <input type="datetime-local" id="startTime">
                    <label style="font-size: 14px; font-weight: 500;">End Time</label>
                    <input type="datetime-local" id="endTime">
                </div>

                <div id="equipmentList">
                </div>
            </div>

            <div class="panel">
                <h3>My Schedule</h3>
                <div id="reservationsList">
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:8080/api';
    let currentUserId = null;

    async function login() {
        // Grab the raw value and strip out any 'N' or 'n' the user might have accidentally typed
        let rawId = document.getElementById('userIdInput').value.trim();
        const cleanId = rawId.replace(/^N/i, '');

        if (!cleanId) return alert("Please enter a valid numeric ID.");

        try {
            const response = await fetch(`${API_BASE}/users/${cleanId}`);
            if (!response.ok) throw new Error();

            currentUserId = cleanId;
            document.getElementById('displayUserId').innerText = cleanId;

            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');

            fetchEquipment();
            fetchMyReservations();
        } catch (error) {
            alert("Access Denied: Student ID not found in database.");
        }
    }

    function logout() {
        currentUserId = null;
        document.getElementById('loginSection').classList.remove('hidden');
        document.getElementById('dashboardSection').classList.add('hidden');
        document.getElementById('userIdInput').value = '';
    }

    async function fetchEquipment() {
        const response = await fetch(`${API_BASE}/equipment`);
        const equipmentData = await response.json();
        const listDiv = document.getElementById('equipmentList');
        listDiv.innerHTML = '';

        if(equipmentData.length === 0) {
            listDiv.innerHTML = '<p style="font-size: 14px;">No equipment available.</p>';
            return;
        }

        equipmentData.forEach(item => {
            listDiv.innerHTML += `
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <strong>${item.name}</strong>
                        <span class="status-badge">${item.status}</span>
                    </div>
                    <button class="small" onclick="bookEquipment(${item.id})">Book Selection</button>
                </div>
            `;
        });
    }

    async function bookEquipment(equipmentId) {
        const start = document.getElementById('startTime').value;
        const end = document.getElementById('endTime').value;

        if (!start || !end) return alert("Please select your start and end times.");

        const bookingPayload = {
            user: { id: currentUserId },
            equipment: { id: equipmentId },
            startTime: start,
            endTime: end
        };

        try {
            const response = await fetch(`${API_BASE}/bookings`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bookingPayload)
            });

            if (response.ok) {
                // Clear the inputs on success
                document.getElementById('startTime').value = '';
                document.getElementById('endTime').value = '';
                fetchMyReservations();
            } else {
                const errorData = await response.json();
                alert(`Conflict: ${errorData.message || 'Time slot already reserved.'}`);
            }
        } catch (error) {
            alert("Server connection error.");
        }
    }

    async function fetchMyReservations() {
        const response = await fetch(`${API_BASE}/bookings/user/${currentUserId}`);
        const reservations = await response.json();
        const listDiv = document.getElementById('reservationsList');
        listDiv.innerHTML = '';

        if (reservations.length === 0) {
            listDiv.innerHTML = '<p style="font-size: 14px;">Your schedule is clear.</p>';
            return;
        }

        reservations.forEach(booking => {
            const startStr = new Date(booking.startTime).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' });
            const endStr = new Date(booking.endTime).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' });

            listDiv.innerHTML += `
                <div class="card">
                    <strong style="display:block; margin-bottom: 5px;">${booking.equipment.name}</strong>
                    <div style="font-size: 13px; color: #555;">
                        <div>⏱️ ${startStr}</div>
                        <div>🏁 ${endStr}</div>
                    </div>
                    <button class="danger small" onclick="cancelBooking(${booking.id})">Cancel</button>
                </div>
            `;
        });
    }

    async function cancelBooking(bookingId) {
        if (!confirm("Cancel this reservation?")) return;
        await fetch(`${API_BASE}/bookings/${bookingId}`, { method: 'DELETE' });
        fetchMyReservations();
    }
</script>

</body>
</html>
